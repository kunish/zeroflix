name: Reflix
options:
  bundleIdPrefix: com.kunish
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    # Ad-hoc sign ("-") so the app gets an application-identifier entitlement
    # (required for Keychain). Works on the Simulator without a dev team.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
targets:
  Reflix:
    type: application
    platform: iOS
    sources:
      - path: Reflix
    info:
      path: Reflix/Info.plist
      properties:
        CFBundleDisplayName: Reflix
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Keep audio playing when the screen locks / the app backgrounds.
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.reflix
        # Lets ReflixTests use `@testable import Reflix`.
        ENABLE_TESTABILITY: "YES"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  ReflixTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReflixTests
    dependencies:
      - target: Reflix
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.reflixTests
schemes:
  Reflix:
    build:
      targets:
        Reflix: all
        ReflixTests: [test]
    test:
      targets:
        - ReflixTests
    run:
      config: Debug
